appId: com.telegram.downloader
productName: Telegram Downloader
copyright: Copyright © 2024

directories:
  buildResources: build
  output: dist

files:
  - out/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: src/renderer/assets/icon.svg

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Telegram Downloader
  installerIcon: src/renderer/assets/icon.svg
  uninstallerIcon: src/renderer/assets/icon.svg
